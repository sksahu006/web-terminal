# Traefik Dynamic Configuration
# Routes for backend API

http:
  routers:
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/admin`) || PathPrefix(`/workspace`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`)"
      service: backend
      entryPoints:
        - web

    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints:
        - web
      priority: 1

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
