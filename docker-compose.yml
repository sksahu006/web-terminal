# Virtual Workspace Platform - Docker Compose
# Production configuration with Nginx reverse proxy

services:
  # Nginx Reverse Proxy & Frontend
  nginx:
    image: nginx:alpine
    container_name: workspace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - workspace-network
    depends_on:
      - backend

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspace-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - workspace-network

networks:
  workspace-network:
    name: workspace-network
    driver: bridge

volumes:
  backend-data:
    name: workspace-backend-data
