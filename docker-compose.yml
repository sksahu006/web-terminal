# Virtual Workspace Platform - Docker Compose
# Production configuration. Frontend built as a standalone Nginx image.

services:
  # Frontend: multi-stage build produces a slim nginx:alpine image
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workspace-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - workspace-network
    depends_on:
      backend:
        condition: service_healthy

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspace-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - workspace-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

networks:
  workspace-network:
    name: workspace-network
    driver: bridge

volumes:
  backend-data:
    name: workspace-backend-data
