# Virtual Workspace Platform - Docker Compose Development
# Development configuration with hot reloading

services:
  # Backend API with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspace-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend-data:/app/data
      - //var/run/docker.sock:/var/run/docker.sock
    networks:
      - workspace-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Frontend development server
  frontend:
    image: node:20-alpine
    container_name: workspace-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npx vite --host 0.0.0.0 --port 5173"
    environment:
      - API_URL=http://backend:8000
    networks:
      - workspace-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  workspace-network:
    name: workspace-network
    driver: bridge

volumes:
  backend-data:
    name: workspace-backend-data-dev
